# Medusa speculative decoding heads configuration
medusa:
  num_heads: 3
  hidden_dim: 4096
  vocab_size: 128256  # LLaMA-3 vocabulary

training:
  num_tokens: 2100000  # 2.1M regulatory tokens
  learning_rate: 3.0e-4
  epochs: 2
  batch_size: 8
  max_length: 512
  seed: 42

# Domain-specific findings:
# - Regulatory text entropy: H=2.31 bits (vs. 3.87 general)
# - Domain Medusa acceptance rate: 91.3% (vs. 82.7% general)
# - Combined speedup with KD: 2.8× (659ms p50)
